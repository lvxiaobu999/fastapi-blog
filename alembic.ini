[alembic]
# Migration scripts are resolved from this config file's directory.
script_location = %(here)s/migrations
# Add the project root to Python's import path for migrations/env.py.
prepend_sys_path = .

# sqlalchemy.url is intentionally omitted. migrations/env.py reads Settings so
# production credentials are not stored in version control.

[loggers]
# The following logger settings affect Alembic CLI output only.
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
