{% extends "layout.html" %}
{% block content %}
<div class="auth-shell">
    <section class="auth-card" aria-labelledby="login-title">
        <div class="auth-card-header">
            <span class="eyebrow">Welcome back</span>
            <h1 id="login-title">登录博客</h1>
            <p>登录后管理个人资料；管理员可以发布和维护文章。</p>
        </div>

        {% if error | default(none) %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="{{ form_action | default('') }}" class="stacked-form">
            <div>
                <label class="form-label" for="username">用户名</label>
                <input class="form-control form-control-lg" id="username" name="username"
                       type="text" autocomplete="username" required autofocus
                       value="{{ username | default('') }}">
            </div>
            <div>
                <div class="form-label-row">
                    <label class="form-label" for="password">密码</label>
                    <a href="#">忘记密码？</a>
                </div>
                <input class="form-control form-control-lg" id="password" name="password"
                       type="password" autocomplete="current-password" required>
            </div>
            <button class="btn btn-primary btn-lg w-100" type="submit">登录</button>
        </form>

        <p class="auth-switch">还没有账号？ <a href="{{ url_for('register') }}">创建账号</a></p>
    </section>
</div>
{% endblock content %}
